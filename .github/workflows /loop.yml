name: 24/7 Bot Loop

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# 🛠️ එකම වෙලාවේ එකකට වඩා දුවන එක නවත්වනවා (Clash වෙන්න දෙන්නේ නැහැ)
concurrency:
  group: bot-247-loop
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install FFmpeg and Fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-noto-core fonts-noto-color-emoji

    - name: Install Dependencies
      run: |
        npm install --legacy-peer-deps
        npm install @google/generative-ai --legacy-peer-deps
        npm install axios --legacy-peer-deps
        npm install groq-sdk --legacy-peer-deps
        npm install sharp --legacy-peer-deps
        npm install -g pm2

    - name: Check FFmpeg
      run: |
        ffmpeg -version
        ffmpeg -filters | grep drawtext

    - name: Run Bot with 5.15 Hour Timeout
      run: |
        # පැය 5යි විනාඩි 15ක් බොටා නොනවතී දුවනවා
        timeout 18900s npm start || true
      env:
        SESSION_ID: ${{ secrets.SESSION_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    - name: Trigger Next Loop Lifecycle
      run: |
        curl -X POST -H "Authorization: token ${{ secrets.G_TOKEN }}" \
        -H "Accept: application/vnd.github.v3+json" \
        https://api.github.com/repos/${{ github.repository }}/actions/workflows/loop.yml/dispatches \
        -d '{"ref":"main"}'
